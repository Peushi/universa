<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Universa — Login</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <div class="auth-page">
    <div class="auth-container">
      <h1>✦ Universa</h1>
      <p class="subtitle">Your world awaits</p>

      <div class="toggle">
        <button id="btn-login" class="toggle-btn active" onclick="showLogin()">Login</button>
        <button id="btn-register" class="toggle-btn" onclick="showRegister()">Register</button>
      </div>

      <div id="login-form">
        <input type="text" id="login-username" placeholder="Username" />
        <input type="password" id="login-password" placeholder="Password" />
        <button class="btn-submit" onclick="login()">Login</button>
      </div>

      <div id="register-form" style="display:none">
        <input type="text" id="reg-username" placeholder="Username" />
        <input type="password" id="reg-password" placeholder="Password" />
        <button class="btn-submit" onclick="register()">Create Account</button>
      </div>

      <p id="message"></p>
    </div>
  </div>

  <script>
    function showLogin() {
      document.getElementById('login-form').style.display = 'flex';
      document.getElementById('register-form').style.display = 'none';
      document.getElementById('btn-login').classList.add('active');
      document.getElementById('btn-register').classList.remove('active');
    }

    function showRegister() {
      document.getElementById('login-form').style.display = 'none';
      document.getElementById('register-form').style.display = 'flex';
      document.getElementById('btn-register').classList.add('active');
      document.getElementById('btn-login').classList.remove('active');
    }

    async function login() {
      const username = document.getElementById('login-username').value.trim();
      const password = document.getElementById('login-password').value.trim();
      const msg = document.getElementById('message');

      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });

      const data = await res.json();
      if (res.ok) {
        window.location.href = '/index.html';
      } else {
        msg.textContent = data.error;
        msg.style.color = 'red';
      }
    }

    async function register() {
      const username = document.getElementById('reg-username').value.trim();
      const password = document.getElementById('reg-password').value.trim();
      const msg = document.getElementById('message');

      const res = await fetch('/api/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });

      const data = await res.json();
      if (res.ok) {
        msg.textContent = 'Account created! Please login.';
        msg.style.color = 'green';
        showLogin();
      } else {
        msg.textContent = data.error;
        msg.style.color = 'red';
      }
    }
  </script>

</body>
</html>
